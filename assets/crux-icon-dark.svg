<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Crux — The Asterisk (Icon, Dark) -->
  <!-- Three intersecting lines: multiple perspectives crossing at one decisive point -->
  
  <rect width="400" height="400" rx="32" fill="#0a0a0a"/>

  <g stroke="#e4e4e7" stroke-width="2.5" stroke-linecap="round">
    <line x1="200" y1="80" x2="200" y2="320"/>
    <line x1="96" y1="260" x2="304" y2="140"/>
    <line x1="96" y1="140" x2="304" y2="260"/>
  </g>
</svg>
